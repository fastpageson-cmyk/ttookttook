<svg viewBox="0 0 940 440" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans CJK KR','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <rect width="940" height="440" fill="#ffffff"/>

  <text x="470" y="34" text-anchor="middle" fill="#1f2d5c" font-size="18" font-weight="700">금리 사이클과 자산, 일반적인 경향</text>
  <text x="470" y="56" text-anchor="middle" fill="#8a91a8" font-size="12">절대적인 공식이 아니라 참고용 경향입니다. 예외가 많습니다.</text>

  <!-- Column headers -->
  <rect x="130" y="80" width="340" height="48" rx="10" fill="#8a3b2b"/>
  <text x="300" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">금리 인상기</text>

  <rect x="510" y="80" width="340" height="48" rx="10" fill="#1f5c6b"/>
  <text x="680" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">금리 인하기</text>

  <!-- Row 1: 채권 -->
  <text x="118" y="168" text-anchor="end" fill="#4a4f63" font-size="13" font-weight="700">채권 가격</text>
  <rect x="130" y="146" width="340" height="50" rx="8" fill="#fbeeeb"/>
  <text x="300" y="176" text-anchor="middle" fill="#8a3b2b" font-size="13">대체로 하락 (기존 채권 매력도↓)</text>

  <rect x="510" y="146" width="340" height="50" rx="8" fill="#e9f4f2"/>
  <text x="680" y="176" text-anchor="middle" fill="#1f5c6b" font-size="13">대체로 상승 (기존 채권 매력도↑)</text>

  <!-- Row 2: 주식 -->
  <text x="118" y="238" text-anchor="end" fill="#4a4f63" font-size="13" font-weight="700">주식시장</text>
  <rect x="130" y="216" width="340" height="50" rx="8" fill="#fbeeeb"/>
  <text x="300" y="240" text-anchor="middle" fill="#8a3b2b" font-size="13">대출·할인율 부담으로 위축 경향</text>
  <text x="300" y="258" text-anchor="middle" fill="#a86c5f" font-size="11">단, 경기·기업 실적에 따라 예외 많음</text>

  <rect x="510" y="216" width="340" height="50" rx="8" fill="#e9f4f2"/>
  <text x="680" y="240" text-anchor="middle" fill="#1f5c6b" font-size="13">상대적으로 우호적인 경향</text>
  <text x="680" y="258" text-anchor="middle" fill="#4c8c8f" font-size="11">단, 경기 침체 우려로 인하할 때는 예외</text>

  <!-- Row 3: 예적금 -->
  <text x="118" y="308" text-anchor="end" fill="#4a4f63" font-size="13" font-weight="700">예적금 매력도</text>
  <rect x="130" y="286" width="340" height="50" rx="8" fill="#fbeeeb"/>
  <text x="300" y="316" text-anchor="middle" fill="#8a3b2b" font-size="13">이자율 상승으로 매력도↑</text>

  <rect x="510" y="286" width="340" height="50" rx="8" fill="#e9f4f2"/>
  <text x="680" y="316" text-anchor="middle" fill="#1f5c6b" font-size="13">이자율 하락으로 매력도↓</text>

  <!-- footnote -->
  <text x="470" y="370" text-anchor="middle" fill="#8a91a8" font-size="11">다음 실습에서 실제 과거 금리 인하기의 S&amp;P500 데이터로 직접 확인해봅니다.</text>
</svg>
